name: Build and Upload Maven Artifacts

on:
  workflow_call:
    inputs:
      isRelease:
        required: true
        type: boolean
      shouldUpload:
        required: true
        type: boolean

jobs:
  preflight:
    name: Validate release prerequisites
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        if: ${{ inputs.isRelease }}
        uses: actions/checkout@v6

      - name: Set up JDK 25
        if: ${{ inputs.isRelease }}
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: "25"
          cache: gradle

      - name: Make Gradle wrapper executable
        if: ${{ inputs.isRelease }}
        run: chmod +x gradlew

      - name: Validate immutable upstream dependencies
        if: ${{ inputs.isRelease }}
        run: ./gradlew --no-daemon validateReleaseDependencies

  build_windows:
    name: Build Windows natives
    needs: preflight
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: "25"
          cache: gradle

      - name: Set up Developer Command Prompt
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: Add Visual Studio tools to PATH
        uses: myci-actions/export-env-var-powershell@1
        with:
          name: PATH
          value: $env:PATH;C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build

      - name: Build Windows JNI, FFM, and TeaVM C runtimes
        run: >
          ./gradlew --no-daemon
          :box3d:builder:jParser_build_windows64_jni
          :box3d:builder:jParser_build_windows64_ffm
          :box3d:builder:jParser_build_windows64_teavm_c

      - name: Upload Windows natives
        uses: actions/upload-artifact@v7
        with:
          name: windows-natives
          path: box3d/builder/build/c++/libs/windows
          if-no-files-found: error

  build_linux:
    name: Build Linux natives
    needs: preflight
    runs-on: ubuntu-22.04
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: "25"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build Linux JNI, FFM, and TeaVM C runtimes
        run: >
          ./gradlew --no-daemon
          :box3d:builder:jParser_build_linux64_jni
          :box3d:builder:jParser_build_linux64_ffm
          :box3d:builder:jParser_build_linux64_teavm_c

      - name: Upload Linux natives
        uses: actions/upload-artifact@v7
        with:
          name: linux-natives
          path: box3d/builder/build/c++/libs/linux
          if-no-files-found: error

  build_macos:
    name: Build macOS natives
    needs: preflight
    runs-on: macos-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: "25"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build Intel and Apple Silicon JNI, FFM, and TeaVM C runtimes
        run: >
          ./gradlew --no-daemon
          :box3d:builder:jParser_build_mac64_jni
          :box3d:builder:jParser_build_macArm_jni
          :box3d:builder:jParser_build_mac64_ffm
          :box3d:builder:jParser_build_macArm_ffm
          :box3d:builder:jParser_build_mac64_teavm_c
          :box3d:builder:jParser_build_macArm_teavm_c

      - name: Upload macOS natives
        uses: actions/upload-artifact@v7
        with:
          name: macos-natives
          path: box3d/builder/build/c++/libs/mac
          if-no-files-found: error

  build_web:
    name: Build WebAssembly runtime
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: "25"
          cache: gradle

      - name: Set up Emscripten
        uses: emscripten-core/setup-emsdk@v16
        with:
          version: "6.0.3"

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build WebAssembly runtime
        run: ./gradlew --no-daemon :box3d:builder:jParser_build_web_wasm

      - name: Upload WebAssembly runtime
        uses: actions/upload-artifact@v7
        with:
          name: web-natives
          path: box3d/builder/build/c++/libs/emscripten
          if-no-files-found: error

  build_android:
    name: Build Android natives
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: "25"
          cache: gradle

      - name: Install Android NDK r27
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27
          add-to-path: false
          link-to-sdk: true

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Build Android JNI and TeaVM C runtimes
        run: >
          ./gradlew --no-daemon
          :box3d:builder:jParser_build_android_jni
          :box3d:builder:jParser_build_android_teavm_c
        env:
          ANDROID_NDK_HOME: ${{ steps.setup-ndk.outputs.ndk-path }}

      - name: Upload Android natives
        uses: actions/upload-artifact@v7
        with:
          name: android-natives
          path: box3d/builder/build/c++/libs/android
          if-no-files-found: error

  publish:
    name: Publish Maven artifacts
    needs: [build_windows, build_linux, build_macos, build_web, build_android]
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      CENTRAL_PORTAL_USERNAME: ${{ secrets.CENTRAL_PORTAL_USERNAME }}
      CENTRAL_PORTAL_PASSWORD: ${{ secrets.CENTRAL_PORTAL_PASSWORD }}
      SIGNING_KEY: ${{ secrets.PGP_SECRET }}
      SIGNING_PASSWORD: ${{ secrets.PGP_PASSPHRASE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: corretto
          java-version: "25"
          cache: gradle

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Download Windows natives
        uses: actions/download-artifact@v8
        with:
          name: windows-natives
          path: box3d/builder/build/c++/libs/windows

      - name: Download Linux natives
        uses: actions/download-artifact@v8
        with:
          name: linux-natives
          path: box3d/builder/build/c++/libs/linux

      - name: Download macOS natives
        uses: actions/download-artifact@v8
        with:
          name: macos-natives
          path: box3d/builder/build/c++/libs/mac

      - name: Download WebAssembly runtime
        uses: actions/download-artifact@v8
        with:
          name: web-natives
          path: box3d/builder/build/c++/libs/emscripten

      - name: Download Android natives
        uses: actions/download-artifact@v8
        with:
          name: android-natives
          path: box3d/builder/build/c++/libs/android

      - name: Verify native artifact set
        shell: bash
        run: |
          set -euo pipefail
          test -f box3d/builder/build/c++/libs/windows/vc/jni/box3d64.dll
          test -f box3d/builder/build/c++/libs/windows/vc/ffm/box3d64.dll
          test -f box3d/builder/build/c++/libs/windows/vc/teavm_c/box3d64.dll
          test -f box3d/builder/build/c++/libs/linux/jni/libbox3d64.so
          test -f box3d/builder/build/c++/libs/linux/ffm/libbox3d64.so
          test -f box3d/builder/build/c++/libs/linux/teavm_c/libbox3d64.so
          test -f box3d/builder/build/c++/libs/mac/jni/libbox3d64.dylib
          test -f box3d/builder/build/c++/libs/mac/arm/jni/libbox3darm64.dylib
          test -f box3d/builder/build/c++/libs/mac/ffm/libbox3d64.dylib
          test -f box3d/builder/build/c++/libs/mac/arm/ffm/libbox3darm64.dylib
          test -f box3d/builder/build/c++/libs/mac/teavm_c/libbox3d64.dylib
          test -f box3d/builder/build/c++/libs/mac/arm/teavm_c/libbox3darm64.dylib
          test -f box3d/builder/build/c++/libs/emscripten/box3d.js
          test -f box3d/builder/build/c++/libs/emscripten/box3d.wasm
          for abi in x86 x86_64 armeabi-v7a arm64-v8a; do
            test -f "box3d/builder/build/c++/libs/android/$abi/libbox3d.so"
            test -f "box3d/builder/build/c++/libs/android/$abi/teavm_c/libbox3d.so"
          done

      - name: Generate Java bindings
        run: ./gradlew --no-daemon :box3d:builder:jParser_generate

      - name: Read release version
        id: version
        shell: bash
        run: |
          version="$(sed -n 's/^version[[:space:]]*=[[:space:]]*//p' gradle.properties | head -n 1 | tr -d '\r')"
          test -n "$version"
          echo "value=$version" >> "$GITHUB_OUTPUT"

      - name: Publish release to Maven Central
        if: ${{ inputs.shouldUpload && inputs.isRelease }}
        run: ./gradlew --no-daemon publishRelease

      - name: Upload signed release bundle proof
        if: ${{ inputs.shouldUpload && inputs.isRelease }}
        uses: actions/upload-artifact@v7
        with:
          name: release-staging-deploy-${{ steps.version.outputs.value }}
          path: |
            build/staging-deploy/
            build/staging-deploy.zip
          if-no-files-found: error

      - name: Prepare local snapshot repository proof
        if: ${{ inputs.shouldUpload && !inputs.isRelease }}
        run: ./gradlew --no-daemon prepareSnapshotDeploy

      - name: Upload snapshot repository proof
        if: ${{ inputs.shouldUpload && !inputs.isRelease }}
        uses: actions/upload-artifact@v7
        with:
          name: snapshot-deploy-${{ steps.version.outputs.value }}-${{ github.run_number }}
          path: build/snapshot-deploy/
          if-no-files-found: error

      - name: Publish snapshot to Central Portal snapshots
        if: ${{ inputs.shouldUpload && !inputs.isRelease }}
        run: ./gradlew --no-daemon publishSnapshot

      - name: Create Git tag
        if: ${{ inputs.shouldUpload && inputs.isRelease }}
        uses: actions/github-script@v8
        with:
          script: |
            const version = '${{ steps.version.outputs.value }}';
            const ref = `refs/tags/${version}`;
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref,
              sha: context.sha
            });
