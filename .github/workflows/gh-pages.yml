name: Deploy GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build web samples
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make Gradle wrapper executable
        run: chmod +x gradlew

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@v15
        with:
          version: latest

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build Box3D WebAssembly runtime
        run: ./gradlew --no-daemon :box3d:builder:jParser_build_web_wasm

      - name: Verify Box3D WebAssembly runtime
        run: |
          test -f box3d/builder/build/c++/libs/emscripten/box3d.js
          test -f box3d/builder/build/c++/libs/emscripten/box3d.wasm

      - name: Build libGDX web samples
        run: |
          ./gradlew --no-daemon \
            :samples:gdx:gl:platforms:web:gdx_teavm_web_js_build \
            :samples:gdx:gl:platforms:web:gdx_teavm_web_wasm_build \
            :samples:gdx:wgpu:platforms:web:gdx_teavm_web_js_build \
            :samples:gdx:wgpu:platforms:web:gdx_teavm_web_wasm_build

      - name: Stage GitHub Pages site
        run: |
          pages_dir="samples/gdx/gl/platforms/web/build/pages"
          rm -rf "$pages_dir"
          mkdir -p "$pages_dir/gdx/gl/js" "$pages_dir/gdx/gl/wasm" "$pages_dir/gdx/webgpu/js" "$pages_dir/gdx/webgpu/wasm"
          cp -R samples/gdx/gl/platforms/web/build/dist/web/webapp/. "$pages_dir/gdx/gl/js/"
          cp -R samples/gdx/gl/platforms/web/build/dist/wasm/webapp/. "$pages_dir/gdx/gl/wasm/"
          cp -R samples/gdx/wgpu/platforms/web/build/dist/web/webapp/. "$pages_dir/gdx/webgpu/js/"
          cp -R samples/gdx/wgpu/platforms/web/build/dist/wasm/webapp/. "$pages_dir/gdx/webgpu/wasm/"
          rm -rf "$pages_dir/gdx/gl/js/WEB-INF" "$pages_dir/gdx/gl/wasm/WEB-INF"
          rm -rf "$pages_dir/gdx/webgpu/js/WEB-INF" "$pages_dir/gdx/webgpu/wasm/WEB-INF"
          cp samples/gdx/gl/platforms/web/src/main/pages/index.html "$pages_dir/index.html"

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: samples/gdx/gl/platforms/web/build/pages

  deploy:
    name: Deploy
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
