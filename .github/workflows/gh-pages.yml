name: Deploy GitHub Pages

on:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    name: Build web samples
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"

      - name: Setup Emscripten
        uses: emscripten-core/setup-emsdk@v15
        with:
          version: latest

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Build Box3D WebAssembly runtime
        run: ./gradlew --no-daemon :box3d:builder:box3d_build_project_web_wasm

      - name: Build GitHub Pages site
        run: ./gradlew --no-daemon :samples:gdx:platforms:web:box3d_gdx_web_pages_build

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: samples/gdx/platforms/web/build/pages

  deploy:
    name: Deploy
    if: github.ref == 'refs/heads/master'
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
