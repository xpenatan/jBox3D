<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>jBox3D Samples</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #070a0f;
      --panel: #111722;
      --panel-strong: #172132;
      --text: #eef3f8;
      --muted: #8fa0b3;
      --line: #2a3544;
      --accent: #f2c84b;
      --accent-2: #68d6c3;
    }

    * {
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      margin: 0;
      background:
        radial-gradient(circle at 18% 12%, rgba(104, 214, 195, 0.16), transparent 32rem),
        radial-gradient(circle at 82% 0%, rgba(242, 200, 75, 0.12), transparent 28rem),
        var(--bg);
      color: var(--text);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    main {
      width: min(1040px, calc(100% - 40px));
      margin: 0 auto;
      padding: 56px 0;
    }

    header {
      display: grid;
      gap: 14px;
      margin-bottom: 32px;
    }

    .brand {
      color: var(--accent);
      font-size: 15px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    h1 {
      max-width: 760px;
      margin: 0;
      font-size: clamp(40px, 7vw, 76px);
      line-height: 0.95;
      letter-spacing: 0;
    }

    .intro {
      max-width: 680px;
      margin: 0;
      color: var(--muted);
      font-size: 18px;
      line-height: 1.55;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      gap: 16px;
    }

    .card {
      display: grid;
      min-height: 128px;
      padding: 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(180deg, var(--panel-strong), var(--panel));
      color: inherit;
      text-decoration: none;
      transition: border-color 140ms ease, transform 140ms ease;
    }

    .card:not(.todo):hover {
      border-color: var(--accent-2);
      transform: translateY(-2px);
    }

    .card.todo {
      opacity: 0.62;
    }

    .tag {
      width: fit-content;
      height: 26px;
      padding: 4px 9px;
      border: 1px solid rgba(104, 214, 195, 0.3);
      border-radius: 999px;
      color: var(--accent-2);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
    }

    .todo .tag {
      border-color: rgba(242, 200, 75, 0.35);
      color: var(--accent);
    }

    h2 {
      margin: 28px 0 0;
      font-size: 24px;
      letter-spacing: 0;
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="brand">jBox3D</div>
      <h1>Box3D Java sample builds</h1>
      <p class="intro">Browser builds for the samples.</p>
    </header>

    <section class="grid" aria-label="Available sample builds">
      <a class="card" href="gdx/gl/js/">
        <span class="tag">Live</span>
        <h2>libGDX WebGL JS</h2>
      </a>

      <a class="card" href="gdx/gl/wasm/">
        <span class="tag">Live</span>
        <h2>libGDX WebGL Wasm</h2>
      </a>

      <div class="card todo" aria-disabled="true">
        <span class="tag">TODO</span>
        <h2>libGDX WebGPU JS</h2>
      </div>

      <div class="card todo" aria-disabled="true">
        <span class="tag">TODO</span>
        <h2>libGDX WebGPU Wasm</h2>
      </div>

      <div class="card todo" aria-disabled="true">
        <span class="tag">TODO</span>
        <h2>libFDX WebGL JS</h2>
      </div>

      <div class="card todo" aria-disabled="true">
        <span class="tag">TODO</span>
        <h2>libFDX WebGL Wasm</h2>
      </div>

      <div class="card todo" aria-disabled="true">
        <span class="tag">TODO</span>
        <h2>libFDX WebGPU JS</h2>
      </div>

      <div class="card todo" aria-disabled="true">
        <span class="tag">TODO</span>
        <h2>libFDX WebGPU Wasm</h2>
      </div>
    </section>
  </main>
</body>
</html>
